name: Deploy

# Nota: a branch real deste repositório é `master` (não `main`), por isso este
# workflow nunca disparava.

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: meli_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        # composer.lock exige PHP ^8.4 (doctrine/instantiator 2.1.0).
        php-version: '8.4'
    
    - name: Install Dependencies (with dev, for tests)
      # phpunit é dependência dev-only: precisa estar presente para o passo de
      # testes abaixo. A reinstalação --no-dev roda só depois, antes do deploy
      # (bug corrigido: a versão anterior instalava --no-dev e então tentava
      # rodar ./vendor/bin/phpunit, que não existe sem dev deps).
      run: composer install --optimize-autoloader
    
    - name: Run Tests
      run: |
        cp .env.example .env
        {
          echo "APP_ENV=testing"
          echo "APP_DEBUG=false"
          echo "APP_KEY=ci-test-key-$(openssl rand -hex 16)"
          echo "MOBILE_TOKEN_SECRET=ci-test-mobile-secret-$(openssl rand -hex 16)"
          echo "DB_CONNECTION=mysql"
          echo "DB_HOST=127.0.0.1"
          echo "DB_PORT=3306"
          echo "DB_DATABASE=meli_test"
          echo "DB_USERNAME=root"
          echo "DB_NAME=meli_test"
          echo "DB_USER=root"
          echo "DB_PASSWORD=root"
          echo "DB_PASS=root"
        } >> .env
        cp .env .env.testing
        ./vendor/bin/phpunit --testsuite Unit

    - name: Install Dependencies (production, no-dev)
      if: success()
      run: composer install --no-dev --optimize-autoloader

    - name: Check deploy secrets
      # A aplicação é editada diretamente no servidor de produção (docroot
      # /home/eskill/htdocs/eskill.com.br, php8.4-fpm) — não há um host remoto
      # de deploy separado configurado, então DEPLOY_KEY/DEPLOY_HOST/DEPLOY_USER
      # nunca foram cadastrados como secrets (confirmado: rsync falhava com
      # "unexplained error (code 255)" por tentar conectar a um host vazio).
      # Este step evita que o workflow fique vermelho por um passo que é
      # opcional/só relevante se um servidor remoto de deploy existir no futuro.
      id: deploy_check
      if: success()
      env:
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      run: |
        if [ -n "$DEPLOY_KEY" ] && [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ]; then
          echo "configured=true" >> "$GITHUB_OUTPUT"
        else
          echo "configured=false" >> "$GITHUB_OUTPUT"
          echo "::notice::DEPLOY_KEY/DEPLOY_HOST/DEPLOY_USER não configurados — pulando deploy remoto (rsync/SSH). A aplicação já é editada diretamente no servidor de produção."
        fi

    - name: Deploy to Production
      if: success() && steps.deploy_check.outputs.configured == 'true'
      env:
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      run: |
        echo "$DEPLOY_KEY" > deploy_key
        chmod 600 deploy_key
        rsync -avz -e "ssh -i deploy_key -o StrictHostKeyChecking=no" \
          --exclude='.git' \
          --exclude='node_modules' \
          --exclude='tests' \
          --exclude='.env' \
          ./ ${DEPLOY_USER}@${DEPLOY_HOST}:/var/www/html/
        rm deploy_key
    
    - name: Run Post-Deploy Commands
      if: success() && steps.deploy_check.outputs.configured == 'true'
      env:
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      run: |
        echo "$DEPLOY_KEY" > deploy_key
        chmod 600 deploy_key
        # scripts/migrate_*.php não existem mais neste projeto; a ferramenta
        # atual de migrations é bin/migrate.php (ver database/migrations/).
        ssh -i deploy_key -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} << 'EOF'
          cd /var/www/html
          php bin/migrate.php
          sudo systemctl reload php8.4-fpm
          sudo systemctl reload nginx
        EOF
        rm deploy_key

# Nginx Configuration for Production (eskill.com.br)
# This is the RECOMMENDED config. The actual config is managed by CloudWays
# at /etc/nginx/sites-enabled/ and proxies through port 8080.
#
# Current architecture:
#   Client → Nginx (:443 SSL) → Nginx (:8080) → PHP-FPM (:19001)
#
# To apply changes, edit via CloudWays panel or /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name eskill.com.br www.eskill.com.br;

    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name eskill.com.br www.eskill.com.br;

    root /home/eskill/htdocs/eskill.com.br/public;
    index index.php index.html;

    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/eskill.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eskill.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Performance: Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # Performance: Browser Caching for static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp|mp4|map|mjs)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # PHP-FPM (CloudWays uses TCP port 19001)
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:19001;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_param HTTPS "on";
        fastcgi_param SERVER_PORT 443;

        # Timeouts
        fastcgi_read_timeout 3600;
        fastcgi_send_timeout 3600;

        # PHP values
        fastcgi_param PHP_VALUE "
error_log=/home/eskill/logs/php/error.log;
memory_limit=512M;
max_execution_time=60;
max_input_time=60;
max_input_vars=10000;
post_max_size=64M;
upload_max_filesize=64M;
date.timezone=UTC;
display_errors=off;";

        try_files $uri =404;
    }

    # Deny access to hidden files
    location ~ /\.(ht|svn|git) {
        deny all;
    }

    # Main location — all routes go to index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Health check endpoint (no logging)
    location /api/health {
        access_log off;
        try_files $uri /index.php?$query_string;
    }
}
